# -------------------------------------------
# Context Graph PostgreSQL Configuration
# Tuned for: read-heavy, <100K nodes, 8GB RAM
# -------------------------------------------

listen_addresses = '*'
port = 5432
max_connections = 100

# --- Memory ---
shared_buffers = '2GB'
effective_cache_size = '6GB'
work_mem = '256MB'
maintenance_work_mem = '512MB'

# --- Write-Ahead Log ---
wal_level = replica
max_wal_size = '2GB'
min_wal_size = '512MB'
checkpoint_completion_target = 0.9
archive_mode = off  # Enable for PITR: set archive_command too

# --- Query Planner ---
random_page_cost = 1.1          # SSD-optimized
effective_io_concurrency = 200  # SSD-optimized
default_statistics_target = 100

# --- Parallelism ---
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_worker_processes = 8

# --- Extensions ---
shared_preload_libraries = 'age'

# --- Logging ---
logging_collector = on
log_directory = 'pg_log'
log_min_duration_statement = 500  # Log queries slower than 500ms
log_statement = 'ddl'

# --- pgvector HNSW tuning ---
# Increase for better recall at query time (default 40)
# SET hnsw.ef_search = 100;  -- per-session override
